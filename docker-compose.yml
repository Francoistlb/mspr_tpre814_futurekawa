# ============================================================
# FutureKawa — Compose principal
# Toutes les valeurs configurables sont dans .env
# ============================================================

services:

  # ---- Base de donnees centralisee -------------------------
  postgres-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa_net

  # ---- Adminer : interface de gestion BDD ------------------
  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - futurekawa_net
    restart: unless-stopped

  # ---- Bresil : MQTT + API ---------------------------------
  bresil-mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./pays/bresil/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - bresil_mqtt_data:/mosquitto/data
      - bresil_mqtt_logs:/mosquitto/log
    networks:
      - bresil_net
    restart: unless-stopped

  bresil-api:
    build:
      context: ./backend-pays
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres-db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_HOST: bresil-mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: futurekawa/bresil/#
      PAYS: bresil
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      RESPONSABLE_EMAIL: ${RESPONSABLE_EMAIL_BRESIL}
    depends_on:
      postgres-db:
        condition: service_healthy
      bresil-mqtt:
        condition: service_started
    networks:
      - bresil_net
      - futurekawa_net
    restart: unless-stopped

  # ---- Equateur : MQTT + API -------------------------------
  equateur-mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./pays/equateur/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - equateur_mqtt_data:/mosquitto/data
      - equateur_mqtt_logs:/mosquitto/log
    networks:
      - equateur_net
    restart: unless-stopped

  equateur-api:
    build:
      context: ./backend-pays
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres-db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_HOST: equateur-mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: futurekawa/equateur/#
      PAYS: equateur
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      RESPONSABLE_EMAIL: ${RESPONSABLE_EMAIL_EQUATEUR}
    depends_on:
      postgres-db:
        condition: service_healthy
      equateur-mqtt:
        condition: service_started
    networks:
      - equateur_net
      - futurekawa_net
    restart: unless-stopped

  # ---- Colombie : MQTT + API -------------------------------
  colombie-mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./pays/colombie/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - colombie_mqtt_data:/mosquitto/data
      - colombie_mqtt_logs:/mosquitto/log
    networks:
      - colombie_net
    restart: unless-stopped

  colombie-api:
    build:
      context: ./backend-pays
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres-db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_HOST: colombie-mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: futurekawa/colombie/#
      PAYS: colombie
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      RESPONSABLE_EMAIL: ${RESPONSABLE_EMAIL_COLOMBIE}
    depends_on:
      postgres-db:
        condition: service_healthy
      colombie-mqtt:
        condition: service_started
    networks:
      - colombie_net
      - futurekawa_net
    restart: unless-stopped

  # ---- Siege : API centrale + Frontend ---------------------
  siege-api:
    build:
      context: ./siege/api
      dockerfile: Dockerfile
    environment:
      BRESIL_API_URL: http://bresil-api:3000
      EQUATEUR_API_URL: http://equateur-api:3000
      COLOMBIE_API_URL: http://colombie-api:3000
      API_TIMEOUT_S: ${API_TIMEOUT_S}
    ports:
      - "${SIEGE_API_PORT:-8000}:8000"
    depends_on:
      - bresil-api
      - equateur-api
      - colombie-api
    networks:
      - futurekawa_net
    restart: unless-stopped

  siege-frontend:
    build:
      context: ./siege/frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - siege-api
    networks:
      - futurekawa_net
    restart: unless-stopped

  # ---- Mailhog : serveur SMTP de test ----------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    networks:
      - futurekawa_net
      - bresil_net
      - equateur_net
      - colombie_net

# ---- Volumes ---------------------------------------------
volumes:
  postgres_data:
  bresil_mqtt_data:
  bresil_mqtt_logs:
  equateur_mqtt_data:
  equateur_mqtt_logs:
  colombie_mqtt_data:
  colombie_mqtt_logs:

# ---- Reseaux ---------------------------------------------
networks:
  bresil_net:
  equateur_net:
  colombie_net:
  futurekawa_net:
