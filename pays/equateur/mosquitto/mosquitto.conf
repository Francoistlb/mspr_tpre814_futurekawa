# FutureKawa — Broker MQTT Equateur
# /!\ allow_anonymous true = dev uniquement, activer auth en prod

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type information

# Structure des topics attendus :
#   futurekawa/EQ/{entrepot_code}/mesures
#   payload JSON : {"temp": 30.8, "hum": 61.0, "ts": "2024-01-15T10:30:00Z"}
