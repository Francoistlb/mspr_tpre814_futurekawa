# FutureKawa — Broker MQTT Colombie
# /!\ allow_anonymous true = dev uniquement, activer auth en prod

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type information

# Structure des topics attendus :
#   futurekawa/CO/{entrepot_code}/mesures
#   payload JSON : {"temp": 25.5, "hum": 79.0, "ts": "2024-01-15T10:30:00Z"}
