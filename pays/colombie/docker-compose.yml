services:
  mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    ports:
      - "${MQTT_PORT:-1885}:1883"
    networks:
      - local_net
    restart: unless-stopped

  api:
    build:
      context: ../../backend-pays
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_PATH: /data/futurekawa.db
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      PAYS: ${PAYS:-colombie}
    volumes:
      - ../../db:/data
    ports:
      - "${API_PORT:-8003}:3000"
    depends_on:
      mqtt:
        condition: service_started
    networks:
      - local_net
    restart: unless-stopped

volumes:
  mqtt_data:
  mqtt_logs:

networks:
  local_net:
    name: fk_colombie_net
