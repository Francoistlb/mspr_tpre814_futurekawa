services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-futurekawa_bresil}
      POSTGRES_USER: ${POSTGRES_USER:-futurekawa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futurekawa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - local_net

  mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    ports:
      - "${MQTT_PORT:-1883}:1883"
    networks:
      - local_net
    restart: unless-stopped

  api:
    build:
      context: ../../api-pays
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-futurekawa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-futurekawa_bresil}
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: "1883"
      PAYS: ${PAYS:-bresil}
      PAYS_CODE: ${PAYS_CODE:-BR}
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - local_net
    restart: unless-stopped

volumes:
  db_data:
  mqtt_data:
  mqtt_logs:

networks:
  local_net:
    name: fk_bresil_net
